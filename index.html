<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Control Financiero</title>
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <header class="header">
    <h1>Control financiero</h1>
    <div id="month-selector"></div>
    <div id="header-balance"></div>
  </header>

  <div id="privacy-banner" class="privacy-banner">
    <span>
      🔒 <strong>Privacidad:</strong>
      Esta aplicación no almacena datos en servidores.
      Toda la información se guarda únicamente en tu dispositivo.
    </span>
    <button id="privacy-accept">Entendido</button>
  </div>

  <section id="alerts" class="card"></section>

  <nav class="tabs">
    <button data-tab="dashboard" class="active">Dashboard</button>
    <button data-tab="register">Registro</button>
    <button data-tab="budgets">Presupuestos</button>
    <button data-tab="analysis">Análisis</button>
    <button data-tab="backup">Backup</button>
  </nav>

  <section id="dashboard" class="card" data-tab-content="dashboard"></section>

  <section class="card" data-tab-content="register">
    <h2>Registro rápido</h2>
    <div class="forms">
      <div>
        <h3>Gasto</h3>
        <form id="expense-form">
          <input type="date" required />
          <input type="text" required placeholder="Tipo">
          <input type="text" placeholder="Descripción" />
          <input type="number" placeholder="Monto" required />
          <button>Agregar</button>
        </form>
      </div>
      <div>
        <h3>Ingreso</h3>
        <form id="income-form">
          <input type="date" required />
          <input type="text" placeholder="Tipo" required />
          <input type="number" placeholder="Monto" required />
          <button>Agregar</button>
        </form>
      </div>
    </div>
  </section>

  <section id="budgets" class="card" data-tab-content="budgets"></section>

  <section data-tab-content="analysis" class="card">
    <div id="category-summary"></div>
    <div id="analysis-transactions"></div>
  </section>

  <section id="backup" class="card" data-tab-content="backup"></section>

  <footer class="footer">
    <span>
      🔐 Esta app es <strong>privacy-first</strong>.
      Tus datos nunca salen de tu dispositivo.
    </span>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>

</html>
